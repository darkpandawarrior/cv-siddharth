name: Refresh project media

# Pulls curated screenshots + demo gifs from the app repos (Mileway, PaymentsLab) and
# regenerates projectStats.ts + galleries.ts from their settings.gradle.kts / Room DB, then
# commits any drift. Runs daily so the portfolio tracks the app repos without a manual poke.
# Local `npm run build` stays offline-safe (prebuild only runs gen:galleries); the network
# refresh lives here.
on:
  schedule:
    - cron: '17 6 * * *'   # daily 06:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-media
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # rebuild-showcase re-stitches the narrated films whenever synced frames
      # change (ubuntu ffmpeg + PIL captions; voiceover comes from the committed
      # content-addressed cache — a narration TEXT change must be re-recorded
      # locally on macOS via `npm run showcase`, and this job fails loudly then).
      - run: pip install --quiet pillow
      - name: Sync media + regenerate stats & galleries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # lifts the raw/API rate limit; repos are public
        run: npm run refresh
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/projects src/data/galleries.ts src/data/projectStats.ts
          if git diff --cached --quiet; then
            echo "Portfolio media already current."
          else
            git commit -m "chore: refresh project media + stats from app repos"
            git push
          fi
