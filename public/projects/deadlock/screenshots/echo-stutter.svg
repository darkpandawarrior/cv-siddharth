<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-label="Echo and Stutter, the core verb of DEADLOCK. Record stores input intent every frame. Stutter freezes the world and rewinds your own tape. Echo replays your past self exactly so you can cooperate with it. Footer states the determinism contract: same intent, same Motion step, bit-identical path.">
  <title>Echo and Stutter, the core verb</title>
  <desc>Three steps built on one deterministic recording system: Record stores input intent, Stutter holds the world for a breath, Echo replays a past self that cooperates with you. Same intent through the same Motion step gives a bit-identical path; if replay drifts, the game is broken.</desc>

  <defs>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#18181b"/>
      <stop offset="1" stop-color="#121214"/>
    </linearGradient>
  </defs>

  <style>
    .rec { animation: rec 6s ease-in-out infinite; }
    @keyframes rec {
      0%, 28%, 62%, 100% { opacity: 1; }
      14% { opacity: 0.25; }
      45% { opacity: 0.3; }
      80% { opacity: 0.3; }
    }
    .breathe { animation: breathe 7s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    @keyframes breathe {
      0%, 100% { transform: scale(1); opacity: 0.94; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .drift { animation: drift 11s ease-in-out infinite; }
    .d2 { animation-delay: -1.6s; }
    .d3 { animation-delay: -3.2s; }
    @keyframes drift {
      0%, 100% { transform: translateX(0px); }
      38% { transform: translateX(-4px); }
      72% { transform: translateX(2.5px); }
    }
    .ticks { animation: ticks 9s ease-in-out infinite; }
    @keyframes ticks {
      0%, 100% { opacity: 0.32; }
      50% { opacity: 0.55; }
    }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <rect width="1200" height="430" rx="16" fill="#101011"/>
  <rect x="0.5" y="0.5" width="1199" height="429" rx="16" fill="none" stroke="#2a2a2c"/>

  <!-- header -->
  <text x="40" y="44" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="4" fill="#d9a441">THE CORE VERB</text>
  <text x="40" y="78" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="27" font-weight="700" fill="#ece9e2">Echo &amp; Stutter</text>
  <text x="1160" y="48" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" fill="#8a877f">one recording system &#183; five uses</text>

  <!-- ============ card 1: RECORD ============ -->
  <g transform="translate(40 104)">
    <rect width="340" height="196" rx="12" fill="url(#card)" stroke="#2a2a2c"/>
    <text x="20" y="34" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="3" fill="#7fb0a6">01&#160;&#160;RECORD</text>
    <g class="rec">
      <circle cx="284" cy="29.5" r="8" fill="#c0392b" opacity="0.12"/>
      <circle cx="284" cy="29.5" r="5.5" fill="#c0392b" opacity="0.22"/>
      <circle cx="284" cy="29.5" r="3.5" fill="#c0392b"/>
      <text x="320" y="34" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" fill="#c0392b" opacity="0.85">REC</text>
    </g>
    <!-- tape strip with sprocket holes, cells hold input intent -->
    <g transform="translate(20 52)">
      <rect width="300" height="46" rx="3" fill="#0f0f11" stroke="#7fb0a6" stroke-opacity="0.55"/>
      <g fill="#7fb0a6" opacity="0.28">
        <rect x="10" y="4" width="4" height="4" rx="1"/><rect x="36" y="4" width="4" height="4" rx="1"/>
        <rect x="62" y="4" width="4" height="4" rx="1"/><rect x="88" y="4" width="4" height="4" rx="1"/>
        <rect x="114" y="4" width="4" height="4" rx="1"/><rect x="140" y="4" width="4" height="4" rx="1"/>
        <rect x="166" y="4" width="4" height="4" rx="1"/><rect x="192" y="4" width="4" height="4" rx="1"/>
        <rect x="218" y="4" width="4" height="4" rx="1"/><rect x="244" y="4" width="4" height="4" rx="1"/>
        <rect x="270" y="4" width="4" height="4" rx="1"/>
        <rect x="10" y="38" width="4" height="4" rx="1"/><rect x="36" y="38" width="4" height="4" rx="1"/>
        <rect x="62" y="38" width="4" height="4" rx="1"/><rect x="88" y="38" width="4" height="4" rx="1"/>
        <rect x="114" y="38" width="4" height="4" rx="1"/><rect x="140" y="38" width="4" height="4" rx="1"/>
        <rect x="166" y="38" width="4" height="4" rx="1"/><rect x="192" y="38" width="4" height="4" rx="1"/>
        <rect x="218" y="38" width="4" height="4" rx="1"/><rect x="244" y="38" width="4" height="4" rx="1"/>
        <rect x="270" y="38" width="4" height="4" rx="1"/>
      </g>
      <g stroke="#2a2a2c">
        <line x1="60" y1="11" x2="60" y2="35"/><line x1="120" y1="11" x2="120" y2="35"/>
        <line x1="180" y1="11" x2="180" y2="35"/><line x1="240" y1="11" x2="240" y2="35"/>
      </g>
      <g font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="14" fill="#7fb0a6" text-anchor="middle">
        <text x="30" y="28">&#8594;</text>
        <text x="90" y="28">&#9651;</text>
        <text x="150" y="28">&#8594;</text>
        <text x="210" y="28">&#8593;</text>
        <text x="270" y="28">&#187;</text>
      </g>
    </g>
    <text x="20" y="158" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#ece9e2">Every frame stores your</text>
    <text x="20" y="178" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#ece9e2"><tspan fill="#7fb0a6">intent</tspan>, never your position.</text>
  </g>

  <!-- arrow 1 to 2 -->
  <g stroke="#d9a441" stroke-width="1.8" fill="none" opacity="0.9">
    <path d="M386 202 h34"/>
    <path d="M414 196 l10 6 l-10 6"/>
  </g>

  <!-- ============ card 2: STUTTER ============ -->
  <g transform="translate(430 104)">
    <rect width="340" height="196" rx="12" fill="url(#card)" stroke="#2a2a2c"/>
    <text x="20" y="34" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="3" fill="#d9a441">02&#160;&#160;STUTTER&#160;&#160;<tspan fill="#8a877f">[ Q ]</tspan></text>
    <!-- pause bars held warm, rewind arc runs the tape back -->
    <g transform="translate(24 58)">
      <g class="breathe">
        <rect x="-1" y="1" width="15" height="44" rx="3" fill="#d9a441" opacity="0.08"/>
        <rect x="14" y="1" width="15" height="44" rx="3" fill="#d9a441" opacity="0.08"/>
        <rect x="0.5" y="2.5" width="12" height="41" rx="2.5" fill="#d9a441" opacity="0.18"/>
        <rect x="15.5" y="2.5" width="12" height="41" rx="2.5" fill="#d9a441" opacity="0.18"/>
        <rect x="2" y="4" width="9" height="38" rx="2" fill="#d9a441"/>
        <rect x="17" y="4" width="9" height="38" rx="2" fill="#d9a441"/>
      </g>
      <path d="M44 40 a26 26 0 1 1 26 -6" stroke="#7fb0a6" stroke-width="2" fill="none"/>
      <path d="M70 22 l0 12 l-11 -3" stroke="#7fb0a6" stroke-width="2" fill="none"/>
    </g>
    <text x="20" y="158" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#ece9e2">Freeze the world <tspan fill="#d9a441">a breath</tspan>.</text>
    <text x="20" y="178" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#ece9e2">Hold it,<tspan fill="#7fb0a6">and breathe</tspan>.</text>
  </g>

  <!-- arrow 2 to 3 -->
  <g stroke="#d9a441" stroke-width="1.8" fill="none" opacity="0.9">
    <path d="M776 202 h34"/>
    <path d="M804 196 l10 6 l-10 6"/>
  </g>

  <!-- ============ card 3: ECHO ============ -->
  <g transform="translate(820 104)">
    <rect width="340" height="196" rx="12" fill="url(#card)" stroke="#2a2a2c"/>
    <text x="20" y="34" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="3" fill="#7fb0a6">03&#160;&#160;ECHO</text>
    <!-- past self as a drifting teal ghost trail, present self still in ink -->
    <g transform="translate(36 58)" stroke-linecap="round">
      <g transform="translate(22 0)" opacity="0.14">
        <g class="drift d3" stroke="#7fb0a6" stroke-width="1.6" fill="none">
          <circle cx="0" cy="12" r="9"/>
          <path d="M0 22 v22 M0 28 l-11 8 M0 28 l11 8 M0 44 l-8 12 M0 44 l8 12"/>
        </g>
      </g>
      <g transform="translate(31 0)" opacity="0.28">
        <g class="drift d2" stroke="#7fb0a6" stroke-width="1.6" fill="none">
          <circle cx="0" cy="12" r="9"/>
          <path d="M0 22 v22 M0 28 l-11 8 M0 28 l11 8 M0 44 l-8 12 M0 44 l8 12"/>
        </g>
      </g>
      <g transform="translate(40 0)" opacity="0.55">
        <g class="drift" stroke="#7fb0a6" stroke-width="1.6" fill="none">
          <circle cx="0" cy="12" r="9"/>
          <path d="M0 22 v22 M0 28 l-11 8 M0 28 l11 8 M0 44 l-8 12 M0 44 l8 12"/>
        </g>
      </g>
      <g transform="translate(104 0)" stroke="#ece9e2" stroke-width="1.8" fill="none">
        <circle cx="0" cy="12" r="9"/>
        <path d="M0 22 v22 M0 28 l-11 8 M0 28 l11 8 M0 44 l-8 12 M0 44 l8 12"/>
      </g>
    </g>
    <text x="20" y="158" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#ece9e2">Your past self replays it,</text>
    <text x="20" y="178" font-family="-apple-system,'Segoe UI',system-ui,sans-serif" font-size="14" fill="#ece9e2">exactly. Now you <tspan fill="#7fb0a6">cooperate</tspan>.</text>
  </g>

  <!-- ============ determinism footer ============ -->
  <g transform="translate(40 330)">
    <rect width="1120" height="54" rx="10" fill="#121214" stroke="#2a2a2c"/>
    <text x="20" y="33" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" letter-spacing="2" fill="#d9a441">DETERMINISM CONTRACT</text>
    <text x="248" y="33" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" fill="#8a877f">same intent&#160;&#8594;&#160;same Motion step&#160;&#8594;&#160;<tspan fill="#7fb0a6">bit-identical path</tspan>.&#160;&#160;if replay drifts, the game is broken.</text>
    <g class="ticks" stroke="#7fb0a6" stroke-width="1" opacity="0.32">
      <line x1="960" y1="17" x2="960" y2="37"/><line x1="972" y1="21" x2="972" y2="33"/>
      <line x1="984" y1="15" x2="984" y2="39"/><line x1="996" y1="21" x2="996" y2="33"/>
      <line x1="1008" y1="17" x2="1008" y2="37"/><line x1="1020" y1="21" x2="1020" y2="33"/>
      <line x1="1032" y1="15" x2="1032" y2="39"/><line x1="1044" y1="21" x2="1044" y2="33"/>
      <line x1="1056" y1="17" x2="1056" y2="37"/><line x1="1068" y1="21" x2="1068" y2="33"/>
      <line x1="1080" y1="15" x2="1080" y2="39"/><line x1="1092" y1="21" x2="1092" y2="33"/>
    </g>
  </g>

  <!-- margin notes -->
  <text x="40" y="414" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" fill="#8a877f" opacity="0.8">recorded at 03:07. everything here is.</text>
  <text x="1160" y="414" text-anchor="end" font-family="ui-monospace,'SF Mono',Menlo,monospace" font-size="13" fill="#8a877f" opacity="0.8">one rehearsal, zero missed marks</text>
</svg>
