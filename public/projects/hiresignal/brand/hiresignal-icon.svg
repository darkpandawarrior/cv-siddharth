<svg width="512" height="512" viewBox="0 0 108 108" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HireSignal">
  <defs>
    <linearGradient id="bg" x1="6" y1="6" x2="102" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#141B24"/>
      <stop offset="1" stop-color="#0A0E14"/>
    </linearGradient>
    <linearGradient id="sig" x1="30" y1="78" x2="86" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F8F6B"/>
      <stop offset="0.55" stop-color="#34D399"/>
      <stop offset="1" stop-color="#4ADE80"/>
