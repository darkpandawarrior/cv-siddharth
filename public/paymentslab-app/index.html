<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F1115">
    <meta name="description" content="PaymentsLab — a multi-gateway payments integration lab. Browser preview running the gateway catalog and explained checkout in MOCK_MODE.">

    <title>PaymentsLab</title>

    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #0F1115;
            overflow: hidden;
        }
        /* ComposeViewport(document.body) injects its own full-size <canvas>. */
        body > canvas { display: block; }
        /* Loading screen — shown until Compose takes over */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            align-items: center;
            justify-content: center;
            background: #0F1115;
            color: #E6E1E5;
            font-family: system-ui, sans-serif;
            font-size: 1.05rem;
            letter-spacing: 0.04em;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        #loader small { opacity: 0.6; font-size: 0.8rem; }
        #loader.hidden { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loader">PaymentsLab<small>loading MOCK_MODE preview&hellip;</small></div>
    <script src="web.js"></script>
    <script>
        // Main.kt uses ComposeViewport(document.body!!), which creates and appends its OWN
        // <canvas>. Do NOT add a manual <canvas id="ComposeTarget"> — that belongs to the older
        // CanvasBasedWindow API, and a stray full-size canvas would sit over Compose's real one and
        // swallow all pointer input (learned in Kursi's cmp-web). Hide the loader as soon as
        // Compose's canvas is inserted; 8s hard fallback for a slow link.
        const loader = document.getElementById('loader');
        const hide = () => loader.classList.add('hidden');
        const obs = new MutationObserver(() => {
            if (document.querySelector('body > canvas')) { hide(); obs.disconnect(); }
        });
        obs.observe(document.body, { childList: true });
        setTimeout(hide, 8000);
    </script>
</body>
</html>
